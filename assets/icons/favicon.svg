<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="100" height="100" rx="13" fill="#0F0F1A"/>
  <!-- 그라디언트 테두리 -->
  <rect x="2" y="2" width="96" height="96" rx="11" fill="none" stroke="url(#bg)" stroke-width="2" opacity="0.7"/>
  <!-- 전파 아크 3개 (워키토키 신호) -->
  <path d="M 50 52 m -30 0 A 30 30 0 0 1 80 52" stroke="url(#bg)" stroke-width="3" fill="none" opacity="0.2" stroke-linecap="round"/>
  <path d="M 50 52 m -20 0 A 20 20 0 0 1 70 52" stroke="url(#bg)" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M 50 52 m -11 0 A 11 11 0 0 1 61 52" stroke="url(#bg)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- 마이크 점 (신호 발신) -->
  <circle cx="50" cy="52" r="5" fill="url(#bg)"/>
  <!-- 남 텍스트 (남원골) -->
  <text x="50" y="84" font-family="'Noto Sans KR', 'Malgun Gothic', sans-serif" font-size="14" font-weight="700" fill="url(#glow)" text-anchor="middle" letter-spacing="1">南</text>
</svg>
