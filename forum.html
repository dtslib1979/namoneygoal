<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>포럼 — 남원골</title>
<meta name="description" content="남원골 12슬롯 길드원·고객 공용 Discord 포럼">
<link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
<link rel="stylesheet" href="/assets/discord/discord.css">
<link rel="stylesheet" href="/assets/discord/namoneygoal-theme.css">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR','DM Mono',monospace; min-height:100vh; }
  .forum-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:1.5rem 2rem;
    border-bottom:1px solid var(--muted);
  }
  .forum-header h1 {
    background:linear-gradient(135deg,#7C3AED,#EC4899,#F59E0B);
    -webkit-background-clip:text; background-clip:text;
    color:transparent;
    font-size:1.2rem; letter-spacing:.15em;
  }
  .back-link { color:var(--muted); text-decoration:none; font-size:.85rem; }
  .back-link:hover { color:#A78BFA; }
  #forum-wrap { padding:1rem 2rem; }
  .placeholder-card {
    max-width:560px; margin:40px auto; padding:40px;
    background:rgba(124,58,237,0.06); border:1px dashed rgba(124,58,237,0.35);
    border-radius:20px; text-align:center;
  }
  .placeholder-card h2 { margin-bottom:12px; font-size:1.1rem; }
  .placeholder-card p { color:#9CA3AF; font-size:0.9rem; line-height:1.6; margin-bottom:8px; }
  .placeholder-card code { background:rgba(0,0,0,0.3); padding:2px 8px; border-radius:4px; color:#A78BFA; font-size:0.8rem; }
</style>
</head>
<body>
<header class="forum-header">
  <h1>💬 FORUM · 남원골</h1>
  <a href="/" class="back-link">← 홈으로</a>
</header>
<div id="forum-wrap"></div>
<script type="module">
  import { CFG } from '/assets/discord/config.js';
  import { injectForum } from '/assets/discord/widget-embed.js';

  const wrap = document.getElementById('forum-wrap');
  const isReady = CFG.FORUM_CH && !CFG.FORUM_CH.startsWith('PLACEHOLDER');

  if (isReady) {
    injectForum(wrap);
  } else {
    wrap.innerHTML = `
      <div class="placeholder-card">
        <h2>📝 Discord 포럼 채널 설정 대기</h2>
        <p>박씨가 <code>/assets/discord/config.js</code> 의 <code>FORUM_CH</code> 값을
        입력하면 Discord 포럼이 여기에 표시됩니다.</p>
        <p style="margin-top:16px;font-size:0.8rem;color:#6B7280;">
        guild ID 는 phoneparis/papafly 와 공유 중이므로 namoneygoal 전용 포럼 채널 ID 만 추가하면 됩니다.
        </p>
      </div>
    `;
  }
</script>
</body>
</html>
