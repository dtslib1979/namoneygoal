name: HQ Upstream Report

on:
  schedule:
    - cron: '0 0 */2 * *'   # 격일 자정 UTC = 한국 09:00
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read manifest
        id: manifest
        run: |
          if [ ! -f .hq/manifest.json ]; then
            echo "manifest 없음 — 부트스트랩 안 됨"
            exit 0
          fi
          echo "cell=$(jq -r '.cellId' .hq/manifest.json)" >> $GITHUB_OUTPUT
          echo "repo=$(jq -r '.cellRepo' .hq/manifest.json)" >> $GITHUB_OUTPUT
          echo "hq=$(jq -r '.hqRepo' .hq/manifest.json)" >> $GITHUB_OUTPUT

      - name: Collect status
        id: status
        run: |
          COMMITS=$(git rev-list --count HEAD)
          LAST_COMMIT=$(git log -1 --format=%H)
          LAST_MSG=$(git log -1 --format=%s | head -c 100)
          echo "commits=$COMMITS" >> $GITHUB_OUTPUT
          echo "last_commit=$LAST_COMMIT" >> $GITHUB_OUTPUT
          echo "last_msg=$LAST_MSG" >> $GITHUB_OUTPUT

      - name: Dispatch to HQ
        if: ${{ steps.manifest.outputs.cell != '' }}
        env:
          HQ_REPORT_TOKEN: ${{ secrets.HQ_REPORT_TOKEN }}
        run: |
          if [ -z "$HQ_REPORT_TOKEN" ]; then
            echo "HQ_REPORT_TOKEN 미설정 — skip"
            exit 0
          fi
          PAYLOAD=$(jq -nc \
            --arg cell "${{ steps.manifest.outputs.cell }}" \
            --arg repo "${{ steps.manifest.outputs.repo }}" \
            --arg ts   "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg commits "${{ steps.status.outputs.commits }}" \
            --arg last_commit "${{ steps.status.outputs.last_commit }}" \
            --arg last_msg "${{ steps.status.outputs.last_msg }}" \
            --arg trigger "${{ github.event_name }}" \
            '{event_type:"cell-report",client_payload:{cell:$cell,repo:$repo,timestamp:$ts,commits:$commits,last_commit:$last_commit,last_msg:$last_msg,trigger:$trigger,status:"online"}}')
          curl -sfX POST \
            -H "Authorization: token $HQ_REPORT_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ steps.manifest.outputs.hq }}/dispatches" \
            -d "$PAYLOAD" && echo "✅ HQ 보고 완료"
